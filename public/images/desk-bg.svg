<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="woodBase" x1="0" y1="0" x2="1" y2="0.25">
      <stop offset="0%"   stop-color="#B87A38"/>
      <stop offset="35%"  stop-color="#D4985A"/>
      <stop offset="65%"  stop-color="#C88A48"/>
      <stop offset="100%" stop-color="#A86E2E"/>
    </linearGradient>
    <filter id="fShadow" x="-8%" y="-6%" width="120%" height="118%">
      <feDropShadow dx="12" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <filter id="fPencil" x="-25%" y="-10%" width="150%" height="130%">
      <feDropShadow dx="5" dy="8" stdDeviation="7" flood-color="#000" flood-opacity="0.48"/>
    </filter>
  </defs>

  <!-- DESK SURFACE -->
  <rect width="1600" height="900" fill="url(#woodBase)"/>

  <!-- Plank separation lines -->
  <g stroke="#936025" stroke-width="2.5" opacity="0.38">
    <line x1="0" y1="225" x2="1600" y2="220"/>
    <line x1="0" y1="450" x2="1600" y2="447"/>
    <line x1="0" y1="675" x2="1600" y2="671"/>
  </g>

  <!-- Fine wood grain -->
  <g stroke="#956020" stroke-width="1.3" fill="none" opacity="0.20">
    <path d="M80,0 Q95,130 82,300 Q70,470 90,650 Q108,820 88,900"/>
    <path d="M200,0 Q215,185 202,410 Q190,640 212,900"/>
    <path d="M335,0 Q318,155 330,370 Q345,580 328,900"/>
    <path d="M480,0 Q464,145 476,335 Q488,530 472,720 Q460,820 478,900"/>
    <path d="M625,0 Q640,205 628,460 Q616,695 632,900"/>
    <path d="M765,0 Q748,165 760,395 Q774,615 757,900"/>
    <path d="M908,0 Q924,180 910,415 Q896,645 915,900"/>
    <path d="M1048,0 Q1032,158 1044,375 Q1058,598 1042,900"/>
    <path d="M1192,0 Q1208,185 1196,420 Q1184,660 1202,900"/>
    <path d="M1342,0 Q1326,162 1340,390 Q1354,620 1337,900"/>
    <path d="M1482,0 Q1498,150 1485,355 Q1472,565 1490,780 Q1500,856 1484,900"/>
    <path d="M1580,0 Q1564,165 1578,395 Q1592,625 1575,900"/>
  </g>

  <!-- RULED PAPER - white A4-ish sheet, slight tilt -->
  <g transform="translate(432, 48) rotate(2, 290, 405)" filter="url(#fShadow)">
    <rect width="578" height="808" rx="3" fill="#FAFAF8"/>

    <!-- Blue ruled lines -->
    <g stroke="#C6D6EE" stroke-width="1.1" opacity="0.88">
      <line x1="55" y1="98"  x2="538" y2="98"/>
      <line x1="55" y1="130" x2="538" y2="130"/>
      <line x1="55" y1="162" x2="538" y2="162"/>
      <line x1="55" y1="194" x2="538" y2="194"/>
      <line x1="55" y1="226" x2="538" y2="226"/>
      <line x1="55" y1="258" x2="538" y2="258"/>
      <line x1="55" y1="290" x2="538" y2="290"/>
      <line x1="55" y1="322" x2="538" y2="322"/>
      <line x1="55" y1="354" x2="538" y2="354"/>
      <line x1="55" y1="386" x2="538" y2="386"/>
      <line x1="55" y1="418" x2="538" y2="418"/>
      <line x1="55" y1="450" x2="538" y2="450"/>
      <line x1="55" y1="482" x2="538" y2="482"/>
      <line x1="55" y1="514" x2="538" y2="514"/>
      <line x1="55" y1="546" x2="538" y2="546"/>
      <line x1="55" y1="578" x2="538" y2="578"/>
      <line x1="55" y1="610" x2="538" y2="610"/>
      <line x1="55" y1="642" x2="538" y2="642"/>
      <line x1="55" y1="674" x2="538" y2="674"/>
      <line x1="55" y1="706" x2="538" y2="706"/>
      <line x1="55" y1="738" x2="538" y2="738"/>
      <line x1="55" y1="770" x2="538" y2="770"/>
    </g>

    <!-- Red margin line -->
    <line x1="80" y1="28" x2="80" y2="788" stroke="#F0A0A2" stroke-width="1.8" opacity="0.72"/>

    <!-- Title underline -->
    <rect x="98" y="55" width="265" height="9" rx="4" fill="#A0BADC" opacity="0.50"/>

    <!-- Handwriting (wavy graphite script lines) -->
    <g stroke="#383838" stroke-width="1.75" fill="none" stroke-linecap="round">
      <path d="M98,98  Q180,95 268,100 Q348,103 435,97 Q494,94 538,99"  opacity="0.86"/>
      <path d="M98,130 Q188,127 284,132 Q365,135 452,129 Q510,126 538,131" opacity="0.80"/>
      <path d="M98,162 Q170,159 262,164 Q342,167 428,161 Q488,158 534,163" opacity="0.78"/>
      <path d="M98,194 Q184,191 278,196 Q358,199 440,193 Q500,190 536,195" opacity="0.83"/>
      <path d="M98,226 Q174,223 267,228 Q347,231 434,225 Q493,222 535,227" opacity="0.77"/>
      <path d="M98,258 Q187,255 280,260 Q362,263 444,257 Q502,254 537,259" opacity="0.81"/>
      <path d="M98,290 Q172,287 264,292 Q344,295 428,289 Q488,286 534,291" opacity="0.79"/>
      <path d="M98,322 Q182,319 276,324 Q354,327 436,321 Q496,318 534,323" opacity="0.75"/>
      <path d="M98,354 Q174,351 268,356 Q347,359 428,353 Q488,350 533,355" opacity="0.78"/>
      <path d="M98,386 Q185,383 280,388 Q360,391 440,385 Q498,382 535,387" opacity="0.80"/>
      <path d="M98,418 Q175,415 266,420 Q344,423 426,417 Q487,414 533,419" opacity="0.76"/>
      <!-- Script in progress — shorter lines -->
      <path d="M98,450 Q180,447 268,452 Q337,455 402,449" opacity="0.70"/>
      <path d="M98,482 Q175,479 255,484 Q318,487 376,482" opacity="0.62"/>
      <path d="M98,514 Q168,511 240,516 Q293,519 338,514" opacity="0.48"/>
    </g>
  </g>

  <!-- PENCIL — yellow HB, diagonal over paper -->
  <g transform="translate(928, 105) rotate(-38, 13, 305)" filter="url(#fPencil)">
    <!-- Body -->
    <rect x="-13" y="0" width="26" height="585" rx="3" fill="#F5CD28"/>
    <!-- Left shade -->
    <rect x="-13" y="0" width="6"  height="585" fill="#D4AE12" opacity="0.52"/>
    <!-- Right highlight -->
    <rect x="7"   y="0" width="4"  height="585" fill="#FFEA58" opacity="0.42"/>
    <!-- Silver ferrule -->
    <rect x="-13" y="548" width="26" height="22" fill="#BEBEBE"/>
    <rect x="-13" y="553" width="26" height="3"  fill="#A2A2A2"/>
    <rect x="-13" y="560" width="26" height="3"  fill="#A2A2A2"/>
    <!-- Eraser -->
    <rect x="-13" y="570" width="26" height="42" rx="3" fill="#FFB0B0"/>
    <rect x="-13" y="570" width="26" height="5"  fill="#EE9898" opacity="0.58"/>
    <!-- Tip -->
    <polygon points="-13,0 13,0 0,-46" fill="#C87840"/>
    <polygon points="-5,-2 5,-2 0,-15"  fill="#262626"/>
    <!-- Brand text -->
    <text x="0" y="350" text-anchor="middle" font-size="11"
          font-family="Arial, Helvetica, sans-serif" font-weight="bold"
          fill="#B09010" opacity="0.68"
          transform="rotate(180,0,293)">HB ✏</text>
  </g>

  <!-- HAND — lower right, pink school sleeve -->
  <g transform="translate(1130, 645) rotate(-26)" opacity="0.94">
    <!-- Sleeve -->
    <ellipse cx="150" cy="62" rx="145" ry="63" fill="#FF9CB6"/>
    <ellipse cx="150" cy="67" rx="135" ry="53" fill="#FF88A8"/>
    <!-- Wrist / palm -->
    <ellipse cx="32"  cy="26" rx="38"  ry="60" fill="#FDDCBE" transform="rotate(-10,32,26)"/>
    <ellipse cx="18"  cy="22" rx="60"  ry="48" fill="#FDDCBE"/>
    <!-- Fingers -->
    <ellipse cx="-16" cy="-3"  rx="13" ry="31" fill="#FDDCBE" transform="rotate(-17,-16,-3)"/>
    <ellipse cx="14"  cy="-17" rx="12" ry="33" fill="#FDDCBE" transform="rotate(-6,14,-17)"/>
    <ellipse cx="45"  cy="-16" rx="12" ry="31" fill="#FDDCBE" transform="rotate(5,45,-16)"/>
    <ellipse cx="75"  cy="-4"  rx="11" ry="28" fill="#FDDCBE" transform="rotate(16,75,-4)"/>
    <!-- Thumb -->
    <ellipse cx="-13" cy="36"  rx="17" ry="11" fill="#FDDCBE" transform="rotate(-38,-13,36)"/>
    <!-- Knuckle highlights -->
    <ellipse cx="-16" cy="-12" rx="6"  ry="4"  fill="#F8C8A6" opacity="0.42" transform="rotate(-17,-16,-12)"/>
    <ellipse cx="14"  cy="-28" rx="5"  ry="4"  fill="#F8C8A6" opacity="0.42"/>
    <ellipse cx="45"  cy="-26" rx="5"  ry="4"  fill="#F8C8A6" opacity="0.42"/>
  </g>
</svg>
