# Railway.app — build + deploy config for Laravel 11
# Nixpacks auto-detects PHP 8.2 from composer.json ("php": "^8.2")
# and installs Composer + required extensions automatically.

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev --no-interaction"]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
