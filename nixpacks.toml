[phases.setup]
nixPkgs = ["php84", "php84Extensions.openssl", "php84Extensions.curl", "php84Extensions.mbstring", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.pdo_sqlite", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.gd", "php84Extensions.zip", "php84Extensions.intl", "php84Extensions.sodium"]

[phases.install]
cmds = [
    "mkdir -p bootstrap/cache storage/framework/cache storage/framework/sessions storage/framework/views storage/framework/testing storage/logs storage/app/public",
    "chmod -R 775 bootstrap/cache storage",
    "composer install --optimize-autoloader --no-dev --no-interaction"
]

[start]
cmd = "php artisan config:clear; php artisan migrate --graceful --force; php artisan serve --host=0.0.0.0 --port=$PORT"
