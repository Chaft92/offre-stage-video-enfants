# Railway.app — build + deploy config for Laravel 11
# Nixpacks auto-detects PHP 8.2 from composer.json

[phases.install]
cmds = [
    "mkdir -p bootstrap/cache storage/framework/{cache,sessions,views,testing} storage/logs storage/app/public",
    "chmod -R 775 bootstrap/cache storage",
    "composer install --optimize-autoloader --no-dev --no-interaction"
]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
